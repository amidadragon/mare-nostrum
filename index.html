  <script>
    // Hide loading screen after p5 starts
    document.addEventListener('click', () => { document.querySelector('canvas')?.focus(); });
    setTimeout(() => {
      const l = document.getElementById('loading');
      if (l) { l.style.opacity = '0'; setTimeout(() => l.remove(), 800); }
    }, 1500);
  </script>
  <script>
    // DEV MODE: nuke everything stale
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.getRegistrations().then(regs => regs.forEach(r => r.unregister()));
      if (window.caches) caches.keys().then(k => k.forEach(n => caches.delete(n)));
    }
    // Auto-delete incompatible saves (version < 8)
    try {
      let raw = localStorage.getItem('sunlitIsles_save');
      if (raw) {
        let d = JSON.parse(raw);
        if (!d.version || d.version < 8) {
          localStorage.removeItem('sunlitIsles_save');
          localStorage.removeItem('sunlitIsles_backup');
          console.log('[SAVE] Removed incompatible save (v' + (d.version || '?') + ')');
        }
      }
    } catch(e) {
      localStorage.removeItem('sunlitIsles_save');
      localStorage.removeItem('sunlitIsles_backup');
    }
    sessionStorage.clear();
    // Re-enable this line for production/itch.io release:
    // if ('serviceWorker' in navigator) navigator.serviceWorker.register('sw.js').catch(() => {});
  </script>
