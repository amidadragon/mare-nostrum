name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Syntax check
        run: npm run check

      - name: Bundle
        run: npm run bundle

      - name: Verify dist output
        run: |
          test -d dist || { echo "dist/ directory missing"; exit 1; }
          test -s dist/*.js || { echo "dist/ has no JS output"; exit 1; }
          echo "dist/ contents:"
          ls -lh dist/
